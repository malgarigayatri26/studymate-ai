services:
  - type: web
    name: studymate-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-frontend-url.vercel.app
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
